<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚓ Batalla Naval Épica ⚓</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            overflow-x: hidden;
            position: relative;
            background: linear-gradient(135deg, #1E90FF 0%, #87CEFA 100%);
            background: url('https://i.pinimg.com/originals/b8/cb/0f/b8cb0fd2b86bbc036709351cc8325c31.gif') no-repeat center center/cover;
            background-attachment: fixed;
        }
        h1 { font-family: 'Press Start 2P', cursive; font-size: 2.5rem; text-align: center; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 20px; position: relative; z-index: 1; }
        .container { max-width: 1400px; width: 100%; background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); border-radius: 20px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); position: relative; z-index: 1; }
        .game-controls { text-align: center; margin-bottom: 30px; }
        .btn { background: linear-gradient(45deg, #ff6b6b, #ee5a6f); border: none; padding: 12px 24px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer; margin: 5px 10px; transition: all 0.3s ease; font-size: 16px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-secondary { background: linear-gradient(45deg, #4ecdc4, #44a08d); }
        #gameIdDisplay { margin-top: 10px; font-size: 1.2rem; }
        .status { text-align: center; margin: 20px 0; padding: 15px; background: rgba(255,255,255,0.2); border-radius: 10px; font-size: 18px; min-height: 50px; display: flex; align-items: center; justify-content: center; }
        .game-area { display: flex; justify-content: space-around; gap: 40px; flex-wrap: wrap; position: relative; z-index: 1; }
        .tablero-container { text-align: center; position: relative; }
        .tablero-title { font-size: 1.4rem; margin-bottom: 15px; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); position: relative; z-index: 2; }
        .tablero { display: grid; grid-template-columns: repeat(10, 40px); grid-template-rows: repeat(10, 40px); gap: 2px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); position: relative; z-index: 2; }
        .celda { width: 40px; height: 40px; border: 1px solid #333; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; transition: all 0.2s ease; border-radius: 3px; position: relative; overflow: hidden; }
        .celda:hover { transform: scale(1.1); z-index: 3; }
        .celda.agua { background: #87CEEB; }
        .celda.barco { background: #696969; }
        .celda.agua-atacada { background: #4169E1; }
        .celda.impacto { background: #FF8C00; }
        .celda.hundido { background: #DC143C; }
        .celda.enemigo { background: #D3D3D3; color: #333; }
        .celda.disabled { cursor: not-allowed; opacity: 0.6; }
        .celda.no-atacable { cursor: not-allowed; opacity: 0.4; background: #999 !important; }
        @keyframes explosion { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.8; } 100% { transform: scale(0); opacity: 0; } }
        .celda.impacto::after, .celda.hundido::after { content: "💥"; position: absolute; font-size: 24px; animation: explosion 0.5s ease-out forwards; }
        .game-info { display: flex; justify-content: space-between; margin-top: 20px; flex-wrap: wrap; gap: 20px; }
        .info-card { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; flex: 1; min-width: 200px; }
        .info-title { font-weight: bold; margin-bottom: 10px; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid #fff; border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none; }

        @media(max-width: 768px) {
            .game-area { flex-direction: column; align-items: center; }
            .tablero { grid-template-columns: repeat(10, 30px); grid-template-rows: repeat(10, 30px); }
            .celda { width: 30px; height: 30px; font-size: 12px; }
        }

        /* Chat: mensajes negros + nombre en negrita */
        #chatBox { color: #000; }
        #chatBox .chat-name { font-weight: 700; }

        /* Globo flotante del chat */
        .chat-toggle{
          position: fixed;
          right: 24px;
          bottom: 24px;
          width: 56px; height: 56px;
          border-radius: 9999px;
          background: linear-gradient(45deg,#4ecdc4,#44a08d);
          box-shadow: 0 10px 25px rgba(0,0,0,.25);
          display: none;
          align-items: center; justify-content: center;
          border: none; cursor: pointer;
          z-index: 1000;
          transition: transform .15s ease;
        }
        .chat-toggle:hover{ transform: translateY(-2px); }
        .chat-toggle svg{ width: 28px; height: 28px; fill: #fff; }

        /* Badge rojo (globito) */
        .chat-toggle .badge{
          position: absolute;
          top: -4px; right: -4px;
          min-width: 18px; height: 18px;
          padding: 0 5px;
          border-radius: 9999px;
          background: #e11d48; /* rojo */
          color: #fff;
          font-size: 11px;
          line-height: 18px;
          text-align: center;
          box-shadow: 0 0 0 2px rgba(255,255,255,0.9);
          display: none;
        }
        .chat-toggle .badge.show{ display: inline-block; }

        /* Panel del chat: flex column (nada se corta) */
        #chatPanel{
          position: fixed;
          right: 24px;
          bottom: 92px;
          width: 480px;
          max-width: calc(100vw - 48px);
          max-height: 75vh;
          border-radius: 16px;
          box-shadow: 0 16px 40px rgba(0,0,0,.35);
          backdrop-filter: blur(8px);
          background: rgba(255,255,255,0.95);
          transform: translateY(12px);
          opacity: 0;
          pointer-events: none;

          display: flex !important;
          flex-direction: column;
          overflow: hidden;

          transition: transform .2s ease, opacity .2s ease;
          z-index: 999;
        }
        #chatPanel.open{
          transform: translateY(0);
          opacity: 1;
          pointer-events: auto;
        }

        /* Encabezado del chat (negro) */
        .chat-header{
          display: flex; align-items: center; justify-content: space-between;
          padding: 10px 14px;
          border-bottom: 1px solid #e5e7eb;
          background: #fff;
          color: #000;                 /* título en negro */
          font-weight: 700;
        }
        /* Fondo lindo del cuerpo */
        .chat-body{
          flex: 1 1 auto;
          overflow-y: auto;
          padding: 12px;
          background:
            radial-gradient( circle at 20% 10%, rgba(255,255,255,0.7), transparent 60% ),
            repeating-linear-gradient(45deg, rgba(0,0,0,0.02) 0, rgba(0,0,0,0.02) 2px, transparent 2px, transparent 6px),
            linear-gradient(180deg,#f8fafc 0%,#eef2f7 100%);
        }
        .chat-inputs{
          flex: 0 0 auto;
          display: flex; gap: 8px; align-items: center;
          padding: 12px;
          background: #fff;
          border-top: 1px solid #e5e7eb;
          width: 100%;
          box-sizing: border-box;
        }
        .chat-inputs input{
          padding:10px; border:1px solid #ccc; border-radius:8px;
          min-width: 0; /* permite encoger en flex */
        }
        #chatName{ flex: 0 0 35%; min-width: 120px; }
        #chatInput{ flex: 1 1 auto; }
        .chat-inputs .btn{
          padding: 10px 14px;
          border-radius: 8px;
          white-space: nowrap;
        }
        .chat-close{
          background: transparent; border: none; font-size: 20px; line-height: 1; cursor: pointer; color:#333;
        }

        /* Burbujas y alineación */
        .chat-line{ display:flex; margin:6px 0; }
        .chat-line.other{ justify-content: flex-start; }
        .chat-line.self{ justify-content: flex-end; }
        .bubble{
          max-width: 85%;
          background:#fff; color:#000;
          border:1px solid #e5e7eb;
          border-radius: 12px;
          padding: 8px 10px;
          box-shadow: 0 4px 10px rgba(0,0,0,.06);
          word-break: break-word;
        }
        .chat-line.self .bubble{
          background:#e6f7f1;
          border-color:#c7eee2;
        }

        /* Toast */
        .toast{
          position: fixed;
          right: 24px;
          bottom: 180px;
          background:#111;
          color:#fff;
          padding:10px 14px;
          border-radius:10px;
          box-shadow:0 10px 30px rgba(0,0,0,.3);
          opacity:0;
          transform: translateY(10px);
          pointer-events:none;
          transition: opacity .2s ease, transform .2s ease;
          z-index: 1001;
        }
        .toast.show{
          opacity:1;
          transform: translateY(0);
        }

        @media (max-width: 480px){
          #chatPanel{ width: calc(100vw - 48px); }
          .chat-body{ max-height: none; }
          .chat-inputs .btn{ padding: 8px 10px; font-size: 14px; }
        }
    </style>
</head>

<!-- SockJS/STOMP -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<body>

<div class="container">
    <h1>⚓ Batalla Naval Épica ⚓</h1>

    <!-- Globo flotante -->
    <button id="chatToggle" class="chat-toggle" onclick="toggleChat()" aria-label="Abrir chat">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 2H4a2 2 0 0 0-2 2v14l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/>
        </svg>
        <span id="chatBadge" class="badge" aria-hidden="true"></span>
    </button>

    <div class="game-controls">
        <button class="btn" onclick="crearJuego()">🆕 Crear Juego</button>
        <button class="btn btn-secondary" onclick="unirseJuego()">🤝 Unirse a Juego</button>
        <button class="btn" id="shuffleBtn" onclick="shuffle()" disabled>🔀 Mezclar Barcos</button>
        <button class="btn" id="confirmarBtn" onclick="confirmar()" disabled>✅ Confirmar Posiciones</button>
        <div id="gameIdDisplay"></div>
    </div>

    <div class="status" id="status">Haz clic en "Crear Juego" o "Unirse a Juego" para empezar</div>

    <div class="game-area" id="gameArea" style="display:none;">
        <div class="tablero-container">
            <div class="tablero-title">🏴‍☠️ Tu Flota</div>
            <div class="tablero" id="tableroJugador"></div>
        </div>
        <div class="tablero-container">
            <div class="tablero-title">🎯 Tablero Enemigo</div>
            <div class="tablero" id="tableroEnemigo"></div>
        </div>
    </div>

    <div class="game-info" id="gameInfo" style="display:none;">
        <div class="info-card">
            <div class="info-title">📊 Estadísticas</div>
            <div>Disparos: <span id="disparos">0</span></div>
            <div>Impactos: <span id="impactos">0</span></div>
            <div>Precisión: <span id="precision">0%</span></div>
        </div>
        <div class="info-card">
            <div class="info-title">🎮 Instrucciones</div>
            <div>• Mezcla tus barcos</div>
            <div>• Confirma posiciones</div>
            <div>• Ataca el tablero enemigo haciendo clic en las celdas</div>
        </div>
    </div>

    <!-- Panel de Chat -->
    <div id="chatPanel" style="display:none; margin-top:20px;">
        <div class="chat-header">
            <span>Chat</span>
            <button class="chat-close" onclick="toggleChat(false)" title="Cerrar">×</button>
        </div>
        <div class="chat-body">
            <div id="chatBox"></div>
        </div>
        <div class="chat-inputs">
            <input id="chatName" placeholder="Tu nombre (se fija al enviar)">
            <input id="chatInput" placeholder="Escribe un mensaje..." onkeydown="if(event.key==='Enter'){enviarMensajeChat();}">
            <button onclick="enviarMensajeChat()" class="btn">Enviar</button>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
</div>

<script>
    let partidaId = null;
    let jugadorId = null;
    let juegoTerminado = false;
    let disparos = 0;
    let impactos = 0;
    let pollingInterval = null;
    let jugador1Confirmado = false;
    let jugador2Confirmado = false;
    let ambosConfirmados = false;
    let ultimoMensajeAtaque = "";
    const API_BASE = '/juego';

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('gameArea').style.display = 'none';
        document.getElementById('gameInfo').style.display = 'none';
        document.getElementById('shuffleBtn').disabled = true;
        document.getElementById('confirmarBtn').disabled = true;
    });

    async function crearJuego() {
        const codigo = prompt('Introduce un código único para tu partida:');
        if (!codigo) return;
        try {
            mostrarCargando('Creando nuevo juego...');
            const response = await fetch(`${API_BASE}/nuevo?codigo=${codigo}`, { method: 'POST' });
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const partida = await response.json();
            partidaId = partida.partidaId;
            jugadorId = partida.jugador1Id;
            localStorage.setItem('partidaId', partidaId);
            localStorage.setItem('jugadorId', jugadorId);
            document.getElementById('gameIdDisplay').textContent = `ID de tu juego: ${partidaId}`;
            document.getElementById('status').textContent = 'Juego creado. Esperando otro jugador...';
            activarControles();
            conectarChat();
        } catch (e) {
            console.error(e);
            document.getElementById('status').textContent = '❌ Error al crear el juego.';
        } finally {
            await cargarTableros();
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(verificarEstadoJuego, 500);
        }
    }

    async function unirseJuego() {
        const idIngresado = prompt('Introduce el ID de la partida:');
        if (!idIngresado) return;
        try {
            mostrarCargando('Uniéndose al juego...');
            const response = await fetch(`${API_BASE}/${idIngresado}/unirse`, { method: 'POST' });
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            jugadorId = await response.text();
            partidaId = idIngresado;
            localStorage.setItem('partidaId', partidaId);
            localStorage.setItem('jugadorId', jugadorId);
            document.getElementById('gameIdDisplay').textContent = `Te has unido al juego: ${partidaId}`;
            activarControles();
            conectarChat();
        } catch (e) {
            console.error(e);
            document.getElementById('status').textContent = '❌ Error al unirse. Verifica el ID.';
        } finally {
            await cargarTableros();
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(verificarEstadoJuego, 500);
        }
    }

    async function shuffle() {
        if (juegoTerminado) return;
        try {
            mostrarCargando('Mezclando barcos...');
            await fetch(`${API_BASE}/${partidaId}/shuffle?jugadorId=${jugadorId}`, { method: 'POST' });
            await cargarTableros();
        } catch (e) {
            console.error(e);
            document.getElementById('status').textContent = '❌ Error al mezclar barcos.';
        }
    }

    async function confirmar() {
        if (juegoTerminado) return;
        try {
            mostrarCargando('Confirmando posiciones...');
            await fetch(`${API_BASE}/${partidaId}/confirmar?jugadorId=${jugadorId}`, { method: 'POST' });
            document.getElementById('shuffleBtn').disabled = true;
            document.getElementById('confirmarBtn').disabled = true;
            setTimeout(verificarEstadoJuego, 100);
        } catch (e) { console.error(e); }
    }

    async function atacar(fila, col) {
        if (juegoTerminado || !ambosConfirmados) {
            if (!ambosConfirmados) {
                document.getElementById('status').textContent = '❌ Ambos jugadores deben confirmar sus tableros antes de atacar.';
            }
            return;
        }

        try {
            const response = await fetch(`${API_BASE}/${partidaId}/atacar?jugadorId=${jugadorId}&fila=${fila}&col=${col}`, { method: 'POST' });
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

            const data = await response.json();
            const resultado = data.resultado;

            await cargarTableros();

            let mensaje = "";
            switch (resultado) {
                case 'AGUA':
                    mensaje = "💧 ¡Fuego! ... Agua. Espera tu próximo turno.";
                    disparos++;
                    break;
                case 'IMPACTO':
                    mensaje = "💥 ¡Fuego! ¡Impacto! Tienes otro turno.";
                    disparos++;
                    impactos++;
                    break;
                case 'HUNDIDO':
                    mensaje = "💀 ¡Fuego! ¡Barco hundido! Tienes otro turno.";
                    disparos++;
                    impactos++;
                    break;
                case 'YA_ATACADA':
                    mensaje = "⚠️ Ya atacaste esa posición. ¡Elige otra!";
                    break;
                case 'NO_ES_TU_TURNO':
                    mensaje = "❌ No es tu turno. Espera al oponente.";
                    break;
                case 'JUEGO_NO_INICIADO':
                    mensaje = "❌ Ambos jugadores deben confirmar sus tableros antes de atacar.";
                    break;
                default:
                    mensaje = "Esperando el turno del oponente...";
                    break;
            }

            ultimoMensajeAtaque = mensaje;
            document.getElementById('status').textContent = mensaje;
            actualizarEstadisticas();

            setTimeout(() => {
                if (ultimoMensajeAtaque === mensaje) {
                    ultimoMensajeAtaque = "";
                }
            }, 3000);

        } catch (e) {
            console.error(e);
            document.getElementById('status').textContent = '❌ Error al atacar.';
        }
    }

    async function cargarTableros() {
        if (!partidaId || !jugadorId) return;

        document.getElementById('gameArea').style.display = 'flex';
        document.getElementById('gameInfo').style.display = 'flex';

        try {
            const response = await fetch(`${API_BASE}/${partidaId}/tablero?jugadorId=${jugadorId}`);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const data = await response.json();

            const jugadorTablero = data.jugador || data.partida?.tableroJugador1;
            const enemigoTablero = data.enemigo || data.partida?.tableroJugador2;

            if (!jugadorTablero || !enemigoTablero) {
                console.warn('Tableros incompletos:', data);
                return;
            }

            mostrarTablero('tableroJugador', jugadorTablero, false);
            mostrarTablero('tableroEnemigo', enemigoTablero, true);
        } catch (e) {
            console.error('Error al cargar tableros:', e);
            document.getElementById('status').textContent = '❌ Error al cargar tableros.';
        }
    }

    function mostrarTablero(id, tablero, oculto) {
        const container = document.getElementById(id);
        container.innerHTML = '';
        if (!tablero || !tablero.grilla) return;

        for (let fila = 0; fila < 10; fila++) {
            for (let col = 0; col < 10; col++) {
                const celda = document.createElement('div');
                celda.className = 'celda';
                const celdaData = tablero.grilla[fila]?.[col] || { estado: 'AGUA' };

                if (!oculto) {
                    switch (celdaData.estado) {
                        case 'AGUA': celda.classList.add('agua'); celda.innerHTML = '🌊'; break;
                        case 'BARCO': celda.classList.add('barco'); celda.innerHTML = '⬛'; break;
                        case 'AGUA_ATACADA': celda.classList.add('agua-atacada'); celda.innerHTML = '💧'; break;
                        case 'IMPACTO': celda.classList.add('impacto'); celda.innerHTML = '💥'; break;
                        case 'HUNDIDO': celda.classList.add('hundido'); celda.innerHTML = '💀'; break;
                        default: celda.classList.add('agua'); celda.innerHTML = '🌊'; break;
                    }
                } else {
                    celda.setAttribute('data-fila', fila);
                    celda.setAttribute('data-col', col);

                    if (!ambosConfirmados) {
                        celda.classList.add('no-atacable');
                        celda.innerHTML = '🔒';
                        celda.onclick = () => {
                            document.getElementById('status').textContent = '❌ Ambos jugadores deben confirmar sus tableros antes de atacar.';
                        };
                    } else {
                        celda.classList.add('enemigo');
                        celda.innerHTML = '❓';
                        celda.onclick = () => atacar(fila, col);

                        switch (celdaData.estado) {
                            case 'IMPACTO':
                                celda.className = 'celda impacto disabled';
                                celda.innerHTML = '💥';
                                celda.onclick = null;
                                break;
                            case 'HUNDIDO':
                                celda.className = 'celda hundido disabled';
                                celda.innerHTML = '💀';
                                celda.onclick = null;
                                break;
                            case 'AGUA_ATACADA':
                                celda.className = 'celda agua-atacada disabled';
                                celda.innerHTML = '💧';
                                celda.onclick = null;
                                break;
                        }
                    }
                }

                container.appendChild(celda);
            }
        }
    }

    function actualizarEstadisticas() {
        document.getElementById('disparos').textContent = disparos;
        document.getElementById('impactos').textContent = impactos;
        document.getElementById('precision').textContent = disparos > 0 ? Math.round((impactos / disparos) * 100) + '%' : '0%';
    }

    function mostrarCargando(msg) {
        document.getElementById('status').innerHTML = `<span class="loading"></span>${msg}`;
    }

    function activarControles() {
        document.getElementById('shuffleBtn').disabled = false;
        document.getElementById('confirmarBtn').disabled = false;
    }

    async function verificarEstadoJuego() {
        if (!partidaId || !jugadorId) return;

        try {
            const response = await fetch(`${API_BASE}/${partidaId}?jugadorId=${jugadorId}`);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const data = await response.json();
            const partida = data.partida || data;

            if (!partida) return;

            const soyJugador1 = partida.jugador1Id === jugadorId;
            const tableroJugador = soyJugador1 ? partida.tableroJugador1 : partida.tableroJugador2;
            const tableroEnemigo = soyJugador1 ? partida.tableroJugador2 : partida.tableroJugador1;

            const nuevoJugadorConfirmado = tableroJugador?.confirmado || false;
            const nuevoEnemigoConfirmado = tableroEnemigo?.confirmado || false;
            const nuevosAmbosConfirmados = nuevoJugadorConfirmado && nuevoEnemigoConfirmado;

            const huboCambio =
                jugador1Confirmado !== nuevoJugadorConfirmado ||
                jugador2Confirmado !== nuevoEnemigoConfirmado ||
                ambosConfirmados !== nuevosAmbosConfirmados;

            jugador1Confirmado = nuevoJugadorConfirmado;
            jugador2Confirmado = nuevoEnemigoConfirmado;
            ambosConfirmados = nuevosAmbosConfirmados;

            if (huboCambio || ambosConfirmados) {
                mostrarTablero('tableroJugador', tableroJugador, false);
                mostrarTablero('tableroEnemigo', tableroEnemigo, true);
            }

            if (!ultimoMensajeAtaque) {
                if (juegoTerminado) {
                    document.getElementById('status').textContent = '🏆 Juego terminado';
                    return;
                }

                if (!ambosConfirmados) {
                    if (!nuevoJugadorConfirmado && !nuevoEnemigoConfirmado) {
                        document.getElementById('status').textContent = '⏳ Ambos jugadores deben confirmar sus tableros para comenzar.';
                    } else if (!nuevoJugadorConfirmado) {
                        document.getElementById('status').textContent = '⏳ Esperando que confirmes tu tablero.';
                    } else if (!nuevoEnemigoConfirmado) {
                        document.getElementById('status').textContent = '⏳ Esperando que el oponente confirme su tablero.';
                    }
                } else {
                    if (partida.turnoActual === jugadorId) {
                        document.getElementById('status').textContent = '🎯 ¡Es tu turno! Elige una celda para atacar.';
                    } else {
                        document.getElementById('status').textContent = '⏳ Esperando el turno del oponente...';
                    }
                }
            }

            if (partida.juegoTerminado) {
                juegoTerminado = true;
                clearInterval(pollingInterval);

                if (partida.ganador === jugadorId) {
                    document.getElementById('status').textContent = '🏆 ¡GANASTE! Has hundido toda la flota enemiga.';
                } else {
                    document.getElementById('status').textContent = '💀 ¡PERDISTE! Tu flota ha sido completamente destruida.';
                }
            }

        } catch (e) {
            console.error('Error al verificar estado del juego:', e);
        }
    }

    // Paleta de colores para nombres
    const NAME_COLORS = [
      "#e53935","#8e24aa","#3949ab","#00897b","#f4511e",
      "#6d4c41","#039be5","#7cb342","#ffb300","#d81b60"
    ];
    function colorFor(identity) {
      let h = 0;
      for (let i = 0; i < identity.length; i++) h = (h * 31 + identity.charCodeAt(i)) | 0;
      return NAME_COLORS[Math.abs(h) % NAME_COLORS.length];
    }

    // --- CENSURA: "volpin" -> "******" (palabra completa, insensible a mayúsculas) ---
    function censorText(str){
      return String(str).replace(/\bvolpin\b/gi, '******');
    }

    function censorText(str){
      return String(str).replace(/\bcfk\b/gi, '***');
    }

    // Toast
    function showToast(msg, ms=1800){
      const t = document.getElementById('toast');
      if(!t) return;
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(()=> t.classList.remove('show'), ms);
    }

    // Badge (globito rojo)
    let unreadCount = 0;
    function setBadge(n){
      unreadCount = Math.max(0, n|0);
      const b = document.getElementById('chatBadge');
      if (!b) return;
      if (unreadCount > 0) {
        b.textContent = unreadCount > 9 ? '9+' : String(unreadCount);
        b.classList.add('show');
      } else {
        b.textContent = '';
        b.classList.remove('show');
      }
    }
    function bumpBadge(){ setBadge(unreadCount + 1); }
    function clearBadge(){ setBadge(0); }

    // Nombre por partida + jugador
    let stompClient = null;
    function chatNameKey(){
      if (!partidaId || !jugadorId) return null;
      return `chatName:${partidaId}:${jugadorId}`;
    }
    function initChatNameLock(){
      const input = document.getElementById('chatName');
      const key = chatNameKey();
      if (!input || !key) return;
      const saved = localStorage.getItem(key);
      if (saved) {
        input.value = saved;
        input.disabled = true;
        input.style.opacity = '0.6';
        input.title = 'Nombre fijado para esta partida (tu jugador)';
      } else {
        input.disabled = false;
        input.placeholder = 'Tu nombre (se fija al enviar)';
        input.style.opacity = '1';
        input.title = '';
      }
    }

    function conectarChat() {
      if (!partidaId) return;
      try {
        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);
        // stompClient.debug = null;
        stompClient.connect({}, function () {
          stompClient.subscribe('/topic/chat/' + partidaId, function (msg) {
            const data = JSON.parse(msg.body || '{}');
            const from = data.from || 'Jugador';
            const content = data.content || '';
            agregarMensajeAlChat(from, content, data.timestamp);

            // Si el mensaje NO es mío y el chat está cerrado, mostrar badge
            const key = chatNameKey();
            const myName = key ? localStorage.getItem(key) : null;
            const isSelf = myName && from === myName;
            if (!isSelf && !chatOpen) bumpBadge();
          });
          document.getElementById('chatToggle').style.display = 'flex';
          initChatNameLock();
        });
      } catch (e) {
        console.error('Error conectando chat:', e);
      }
    }

    function enviarMensajeChat() {
      if (!stompClient || !partidaId || !jugadorId) return;
      const key = chatNameKey();
      const nameInput = document.getElementById('chatName');
      const textInput = document.getElementById('chatInput');
      const existing = key ? localStorage.getItem(key) : null;

      let name = (nameInput.value || '').trim();
      if (!existing) {
        if (!name) {
          const suf = String(jugadorId).slice(-4);
          name = `Jugador-${suf}`;
        }
        name = censorText(name); // censura en nombre
        if (key) {
          localStorage.setItem(key, name);
        }
        nameInput.value = name;
        nameInput.disabled = true;
        nameInput.style.opacity = '0.6';
        nameInput.title = 'Nombre fijado para esta partida (tu jugador)';
        showToast('Nombre guardado para esta partida ✅');
      } else {
        name = existing;
      }

      let text = (textInput.value || '').trim();
      if (!text) return;
      text = censorText(text); // censura en mensaje

      const payload = { from: name, content: text };
      stompClient.send('/app/chat/' + partidaId, {}, JSON.stringify(payload));
      textInput.value = '';
    }

    function agregarMensajeAlChat(from, content, ts) {
      const box = document.getElementById('chatBox');
      const time = ts ? new Date(ts).toLocaleTimeString() : new Date().toLocaleTimeString();

      const identity = (partidaId ? String(partidaId) : "") + "|" + (from || "Jugador");
      const nameColor = colorFor(identity);

      // Censura al mostrar (por si el otro cliente no censuró al enviar)
      const fromDisplay = censorText(from || "Jugador");
      const contentDisplay = censorText(content || "");

      const key = chatNameKey();
      const savedName = key ? localStorage.getItem(key) : null;
      const isSelf = savedName && from === savedName;

      const line = document.createElement('div');
      line.className = 'chat-line ' + (isSelf ? 'self' : 'other');

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      const nameSpan = document.createElement('span');
      nameSpan.className = 'chat-name';
      nameSpan.style.color = nameColor;
      nameSpan.textContent = `[${time}] ${fromDisplay}: `;

      const msgSpan = document.createElement('span');
      msgSpan.className = 'chat-text';
      msgSpan.style.color = '#000';
      msgSpan.textContent = contentDisplay;

      bubble.appendChild(nameSpan);
      bubble.appendChild(msgSpan);
      line.appendChild(bubble);
      box.appendChild(line);
      box.scrollTop = box.scrollHeight;
    }

    let chatOpen = false;
    function toggleChat(force) {
      const panel = document.getElementById('chatPanel');
      if (force === true) chatOpen = true;
      else if (force === false) chatOpen = false;
      else chatOpen = !chatOpen;

      panel.classList.toggle('open', chatOpen);
      document.getElementById('chatToggle')
        .setAttribute('aria-label', chatOpen ? 'Cerrar chat' : 'Abrir chat');

      if (chatOpen) {
        clearBadge(); // al abrir, se limpia el globito rojo
        setTimeout(() => {
          const box = document.getElementById('chatBox');
          if (box) box.scrollTop = box.scrollHeight;
          document.getElementById('chatInput')?.focus();
        }, 50);
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') toggleChat(false);
    });
</script>

</body>
